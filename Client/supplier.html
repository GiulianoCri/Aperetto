<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
</head>

<body class="body-custom mt-5">

    <div class="navbar-custom d-flex fixed-top align-items-center gap-3 px-3 bg-primary">
        <img src="/Foto/APERETTO (1).png" alt="Logo Aperetto" class="logo">
        <div class="col"></div>
        <a href="profilo-supplier.html" class="nav-login-link">Hai già un account? Accedi</a>
    </div>

    <div class="container-fluid px-0">
        <div class="row g-0 min-vh-100"> 
            
            <!-- LATO SINISTRO: immagine -->
            <div class="col-12 col-md-6 position-relative bg-secondary" style="overflow: hidden;">
                <h1 class="left-headline mt-5 mx-auto">
                    Porta il tuo locale in <span>Aperetto</span>!
                </h1>
            </div>

            <!-- LATO DESTRO: form -->
            <div class="col-12 col-md-6 d-flex align-items-start justify-content-center p-4 mt-4">

                <div class="d-flex flex-column w-100">
                    <!-- STEPPER -->
                    <div class="stepper w-75 mb-4 mx-auto sticky-top" id="stepper">
                        <div class="step active" id="s1">
                            <div class="step-circle">1</div>
                            <div class="step-label">Contatto</div>
                        </div>
                        <div class="step-line" id="l1"></div>
                        <div class="step" id="s2">
                            <div class="step-circle">2</div>
                            <div class="step-label">Il locale</div>
                        </div>
                        <div class="step-line" id="l2"></div>
                        <div class="step" id="s3">
                            <div class="step-circle">3</div>
                            <div class="step-label">Social</div>
                        </div>
                        <div class="step-line" id="l3"></div>
                        <div class="step" id="s4">
                            <div class="step-circle">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                    stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                                    <polyline points="20 6 9 17 4 12"/>
                                </svg>
                            </div>
                            <div class="step-label">Fatto!</div>
                        </div>
                    </div>
                    
                    <!-- STEP 1: DETTAGLI DI CONTATTO -->
                    <div class="form-title d-flex flex-column gap-2 mb-3 mx-auto w-100" id="step1">
                        <form class="justify-content-sm-between d-flex flex-column" id="formStep1">
                            <h3 class="mb-3 text-start form-title mx-auto">Dettagli di contatto</h3>
                            <div class="row g-2 mb-3 d-flex mx-3">
                                <div class="col-6">
                                    <label for="name" class="form-label-custom">Nome*</label>
                                    <div>
                                        <input type="text" class="form-control-lg border-0 rounded-3 w-100" id="name" placeholder="Nome" required>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <label for="surname" class="form-label-custom">Cognome*</label>
                                    <div>
                                        <input type="text" class="form-control-lg border-0 rounded-3 w-100" id="surname" placeholder="Cognome" required>
                                    </div>
                                </div>
                                
                                <div class="col-12">
                                    <label for="email" class="form-label-custom mt-4">E-Mail*</label>
                                    <input type="email" class="form-control-lg border-0 rounded-3 w-100" id="email" placeholder="E-Mail" required>
                                </div>

                                <div class="col-12">
                                    <label for="telefono" class="form-label-custom mt-4">Numero di telefono*</label>
                                    <input type="tel" class="form-control-lg border-0 rounded-3 w-100" id="telefono" value="+39" required>
                                </div>
                            </div>

                            <div class="d-flex mt-2 mx-3">
                                <input type="checkbox" id="consensi" required>
                                <label class="form-label-custom" >Desidero ricevere comunicazioni da Aperetto</label>
                            </div>
                            
                            <div class="d-flex gap-3 align-items-center mb-4 mt-5 mx-3">
                                <button type="submit" id="okContatto" class="btn btn-lg btn-success m-auto w-100">Avanti</button>
                            </div>
                        </form>
                    </div>

                    <!-- STEP 2: IL LOCALE-->
                    <div class="form-title d-flex flex-column gap-2 mb-3 mx-auto w-100 mt-5 d-none" id="step2">                   
                        <form class="justify-content-sm-between d-flex flex-column" id="formStep2">
                            <h3 class="mb-3 text-start form-title mx-auto">Dettagli del locale</h3>
                            <div class="row g-2 mb-3 d-flex mx-3">
                                <div class="col-12">
                                    <label for="name" class="form-label-custom">Come si chiama il tuo locale?*</label>
                                    <div>
                                        <input type="text" class="form-control-lg border-0 rounded-3 w-100" id="nomeLocale" required>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="surname" class="form-label-custom">Qual'è il suo indirizzo?*</label>
                                    <div>
                                        <input type="text" class="form-control-lg border-0 rounded-3 w-100" id="indirizzoLocale" required>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label for="telefono" class="form-label-custom mt-4">Numero di telefono del locale:</label>
                                    <input type="tel" class="form-control-lg border-0 rounded-3 w-100" id="telefonoLocale" value="+39">
                                </div>

                                <div class="col-12 btn-group"> 
                                    <label for="telefono" class="form-label-custom mt-4">Che servizio offre il tuo locale?</label>
                                    <input type="checkbox" id="aperitivo">
                                    <label for="aperitivo" class="form-label-custom">Aperitivo</label>
                                    <input type="checkbox" id="colazione">
                                    <label for="colazione" class="form-label-custom">Colazione</label>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-3 align-items-center mb-4 mt-5 mx-3">
                                <button type="submit" id="okLocale" class="btn btn-lg btn-success m-auto w-100 mb-3">Avanti</button>
                            </div>
                        </form>
                    </div>

                    <!-- STEP 3: SOCIAL -->
                    <div class="form-title d-flex flex-column gap-2 mb-3 mx-auto w-100 mt-5 d-none" id="step3">
                        <form class="justify-content-sm-between d-flex flex-column" id="formStep3">
                            <h3 class="mb-3 text-start form-title mx-auto">Social del locale</h3>
                            <div class="row g-2 mb-3 d-flex mx-3">
                                <div class="col-12">
                                    <label for="name" class="form-label-custom">Avete un sito web?</label>
                                    <div>
                                        <input type="url" class="form-control-lg border-0 rounded-3 w-100" id="sitoWeb" placeholder="https://www.esempio.it">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="surname" class="form-label-custom">Instagram</label>
                                    <div>
                                        <input type="text" class="form-control-lg border-0 rounded-3 w-100" id="instagram" placeholder="@nomeutente">
                                    </div>
                                </div>
                                <div class="col-12">
                                    <label for="surname" class="form-label-custom">Facebook</label>
                                    <div>
                                        <input type="text" class="form-control-lg border-0 rounded-3 w-100" id="facebook" placeholder="@nomeutente">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-flex gap-3 align-items-center mb-4 mt-5 mx-3">
                                <button type="submit" id="okSocial" class="btn btn-lg btn-success m-auto w-100 mb-3">Avanti</button>
                            </div>
                        </form>
                    </div>

                    <!-- STEP 4: CONFERMA -->
                    <div class="form-title d-flex flex-column gap-2 mb-3 mx-auto w-100 mt-5 d-none confirm-supplier" id="step4">
                        <div class="align-items-center d-flex" id="conferma">
                            <div id="confirm" class="text-center m-auto mb-4">
                                <img src="/Foto/confirm-log.png" class="confirm-success m-auto">
                                <div>
                                    <h3 class="text-black d-inline">La tua </h3> 
                                    <h3 class="text-success d-inline">registrazione</h3>
                                    <h3 class="text-black d-inline"> è avvenuta con successo!</h3>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="d-flex flex-column w-100 d-none">
                    
                </div>

            </div>  
        </div>
    </div>

    <script> 
        const svgCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <polyline points="20 6 9 17 4 12"/></svg>`;

        function goTo(n) {
            // mostra/nasconde gli step
            ['step1','step2','step3','step4'].forEach((id, i) => {
                document.getElementById(id).classList.toggle('d-none', i + 1 !== n);
            });

            // aggiorna cerchi
            for (let i = 1; i <= 4; i++) {
                const s    = document.getElementById('s' + i);
                const circ = s.querySelector('.step-circle');
                s.classList.remove('active', 'done');
                if (i < n) {
                    s.classList.add('done');
                    circ.innerHTML = svgCheck;
                } else if (i === n) {
                    s.classList.add('active');
                    if (i < 4) circ.textContent = i;
                } else {
                    if (i < 4) circ.textContent = i;
                }
            }

            // aggiorna linee
            for (let i = 1; i <= 3; i++)
                document.getElementById('l' + i).classList.toggle('done', i < n);
        }

        document.getElementById('okContatto').addEventListener('click', e => { e.preventDefault(); goTo(2); });
        document.getElementById('okLocale')  .addEventListener('click', e => { e.preventDefault(); goTo(3); });
        document.getElementById('okSocial')  .addEventListener('click', e => { e.preventDefault(); goTo(4); });

    </script>

</body>
</html>
