<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
</head>
<body>
    <div class="container-fluid px-0">
        <div class="row g-0 min-vh-100"> 
            
            <!-- LATO SINISTRO: immagine -->
            <div class="col-12 col-md-6 position-relative" style="overflow: hidden;">
                <button class="backbtn back-white border-0 bg-transparent position-absolute top-0 start-0 mt-3 ms-3 z-1" 
                        onclick="window.location.href='login.html'"></button>
                <img src="/Foto/people(1).jpg" class="h-100 w-auto object-fit-cover ogbject-position-center d-block" style="object-position: center;">
            </div>

            <!-- LATO DESTRO: form -->
            <div class="col-12 col-md-6 d-flex align-items-center justify-content-center p-4">
                <div class="p-5 pb-2 rounded-5 shadow border-0 bg-secondary w-100" 
                     id="formContainer" style="max-width: 480px;">
                    <form class="d-flex flex-column" id="formLogin">
                        <div class="d-flex flex-column">
                            <input type="email" placeholder="E-Mail" id="emailLogin" class="form-control rounded-3"> <br>
                            <div class="position-relative">
                                <input type="password" placeholder="Password" id="pswField" class="form-control rounded-3 pe-5">
                                <button type="button" id="showPswBtn" class="position-absolute border-0 p-0 psw-btn">
                                    <img src="/Foto/eye-on.svg" width="18" alt="Mostra password">
                                </button>
                                <button type="button" id="hidePswBtn" class="position-absolute border-0 p-0 psw-btn d-none">
                                    <img src="/Foto/eye-off.svg" width="18" alt="Nascondi password">
                                </button>
                            </div>
                            <a href="#" id="forgotPsw" class="link-dark">Password dimenticata?</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
