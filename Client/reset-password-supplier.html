<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimposta Password - Aperetto</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="classi_ordinate.css">
</head>
<body>

    <div class="container-fluid px-0">
        <div class="row g-0 min-vh-100"> 
            
            <!-- LATO SINISTRO: immagine -->
            <div class="col-12 col-md-6 position-relative overflow-hidden" style=" height: 100vh;">
                
                <img src="/Foto/people(1).jpg" alt="Sfondo locale" class="position-absolute mt-0 mr-0 w-100 h-100 object-fit-cover" style="z-index: 0;">

                <!-- overlay scuro: aumenta la leggibilità del testo -->
                <div class="position-absolute mt-0 me-0 w-100 h-100" style="background: rgba(0,0,0,0.45); z-index: 1;"></div>

                <h1 class="left-headline mt-5 mx-auto position-relative text-white" style="z-index: 2;">
                    Bentornato in <span>Aperetto</span>!
                </h1>

            </div>

            <!-- LATO DESTRO: form -->
            <div class="col-12 col-md-6 d-flex p-4 overflow-hidden" style="height: 100vh;" id="container">
                
                <div class="d-flex flex-column w-100 position-relative rounded-4 h-100">
                    <div class="luogo-card p-5 pb-2 rounded-5 mx-0 my-auto">

                        <!-- FORM RESET -->
                        <div id="resetForm">
                            <h2 class="text-center mb-4">Reimposta la password</h2>

                            <div class=" d-flex flex-column gap-3">

                                <div class="position-relative">
                                    <label for="newPassword" class="info-pill-label login-color mt-4 mx-2">Password</label>
                                    <input type="password" id="newPassword" class="info-pill form-control rounded-3 pe-5" required>
                                    
                                    <button type="button" id="showPsw-reg" class="position-absolute border-0 p-0 mt-2 psw-btn">
                                        <img src="/Foto/eye-on.svg" width="18" alt="Mostra password">
                                    </button>
                                    <button type="button" id="hidePsw-reg" class="position-absolute border-0 p-0 mt-2 psw-btn d-none">
                                        <img src="/Foto/eye-off.svg" width="18" alt="Nascondi password">
                                    </button>
                                </div>

                                <div class="position-relative">
                                    <label for="confirmPassword" class="info-pill-label login-color mt-4 mx-2">Conferma password</label>
                                    <input type="password" class="info-pill form-control rounded-3 pe-5" id="confirmPassword" required>
                                    
                                    <button type="button" id="showConf" class="position-absolute border-0 p-0 mt-2 psw-btn">
                                        <img src="/Foto/eye-on.svg" width="18" alt="Mostra password">
                                    </button>
                                    <button type="button" id="hideConf" class="position-absolute border-0 p-0 mt-2 psw-btn d-none">
                                        <img src="/Foto/eye-off.svg" width="18" alt="Nascondi password">
                                    </button>
                                </div>

                                <div id="errorMsg" class="text-danger d-none"></div>
                                    <button id="resetBtn" class="btn btn-success rounded-3 w-100 mt-2 mb-5">
                                        Reimposta Password
                                    </button>
                                </div>
                        </div>

                        <!-- SUCCESSO -->
                        <div id="successDiv" class="text-center d-none mb-4">
                            <h3 class="text-success fw-bold mt-3">Password reimpostata!</h3>
                            <p class="text-muted">Ora puoi accedere con la tua nuova password.</p>
                            <a href="/login-supplier.html" class="btn btn-success rounded-3 mt-2">Vai al login</a>
                        </div>

                        <!-- TOKEN NON VALIDO -->
                        <div id="invalidToken" class="text-center d-none mb-4">
                            <h3 class="text-danger fw-bold mt-3">Link non valido o scaduto</h3>
                            <p class="text-muted">Richiedi un nuovo link di recupero.</p>
                            <a href="/login-supplier.html" class="btn btn-outline-dark rounded-3 mt-2">Torna al login</a>
                        </div>

                    </div>
                </div>

            </div>  
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        // controlla se il token per il recupero password è ancora valido oppure scaduto
        // nel secondo caso viene disattivata la schermata per il reset password e viene mostrato un messaggio di errore
        if (!token) {
            document.getElementById('resetForm').classList.add('d-none');
            document.getElementById('invalidToken').classList.remove('d-none');
        }

        const newPassword = document.getElementById('newPassword');
        const confirmPassword = document.getElementById('confirmPassword');

        // PAGINA DI REGISTRAZIONE
        const showPswReg = document.getElementById('showPsw-reg');
        const hidePswReg = document.getElementById('hidePsw-reg');

        showPswReg.addEventListener('click', () => {
            newPassword.type = 'text';
            showPswReg.classList.add('d-none');
            hidePswReg.classList.remove('d-none');
            hidePswReg.classList.add('d-block');
        });

        hidePswReg.addEventListener('click', () => {
            newPassword.type = 'password';
            hidePswReg.classList.add('d-none');
            showPswReg.classList.remove('d-none');
            showPswReg.classList.add('d-block');
        });

        // PAGINA DI CONFERMA
        const showConf = document.getElementById('showConf');
        const hideConf = document.getElementById('hideConf');

        showConf.addEventListener('click', () => {
            confirmPassword.type = 'text';
            showConf.classList.add('d-none');
            hideConf.classList.remove('d-none');
            hideConf.classList.add('d-block');
        });

        hideConf.addEventListener('click', () => {
            confirmPassword.type = 'password';
            hideConf.classList.add('d-none');
            showConf.classList.remove('d-none');
            showConf.classList.add('d-block');
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            
            const errorMsg = document.getElementById('errorMsg');
            // viene fatto il controllo sulla lunghezza della password
            if ((newPassword.value).length < 8) {
                errorMsg.textContent = "La password deve avere almeno 8 caratteri";
                errorMsg.classList.remove('d-none');
                return;
            }
            // viene controllato se password e confirmPassword sono uguali
            if (newPassword.value !== confirmPassword.value) {
                errorMsg.textContent = "Le password non coincidono";
                errorMsg.classList.remove('d-none');
                return;
            }

            errorMsg.classList.add('d-none');

            try {
                // se tutti i controlli hanno esito positivo, allora viene inviata una richiesta per il
                // reset password dedicato all'user (consumer)
                const response = await fetch('/api/reset-password-supplier', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: newPassword.value })
                });

                const data = await response.json();

                if (response.ok) {
                    // se reset password avviene senza errori, viene mostrato un messaggio di successo sullo schermo
                    document.getElementById('resetForm').classList.add('d-none');
                    document.getElementById('successDiv').classList.remove('d-none');
                } else {
                    if (response.status === 400 && data.error.includes('scaduto') || data.error.includes('valido')) {
                        document.getElementById('resetForm').classList.add('d-none');
                        document.getElementById('invalidToken').classList.remove('d-none');
                    } else {
                        errorMsg.textContent = data.error;
                        errorMsg.classList.remove('d-none');
                    }
                }
            } catch (err) {
                console.error("Errore:", err);
                errorMsg.textContent = "Errore di connessione al server";
                errorMsg.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
