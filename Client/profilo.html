<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="classi.css">
</head>

<body class="body-custom">
    <div class="navbar-custom d-flex fixed-top align-items-center gap-3 px-3 bg-primary">
        <img src="/Foto/APERETTO (1).png" alt="Logo Aperetto" class="logo" onclick="window.location.href='index.html'">
        <img src="/Foto/profilo_text.png" alt="Profilo" class="mt-3 mb-1 profilo-txt">
    </div>
    <!--Bottone per tornare indietro-->
    <button class="btn-back-banner-profilo mb-1" onclick="window.location.href='/'">← Torna alla lista</button>

    <!-- PAGINA -->
    <div class="profilo-page">
        <div class="profilo-grid">
 
            <!-- ── SINISTRA: dati utente ── -->
            <aside class="profilo-sidebar">
                <!--Scritta caricamento presente soltanto durante il caricamento dei dati-->
                <div id="profilo-nome" class="profilo-nome">Caricamento...</div>
                <!--Informazioni utente-->
                <div class="profilo-info">
                    <div class="info-row">
                        <label>Nome</label>
                        <span id="info-nome">–</span>
                    </div>
                    <div class="info-row">
                        <label>Cognome</label>
                        <span id="info-cognome">–</span>
                    </div>
                    <div class="info-row">
                        <label>Email</label>
                        <span id="info-email">–</span>
                    </div>
                </div>
                <!-- Bottone per il logout -->
                <button class="btn-logout" id="logoutBtn">Esci dall'account</button>
            </aside>
 
            <!-- DESTRA: recensioni -->
            <section class="profilo-content">
                <div class="section-title">Le mie recensioni</div>
                <div id="recensioni-container">
                    <!-- Verrà popolato da JS -->
                    <div class="empty-state">
                        <div class="empty-icon">⭐</div>
                        <p>Non hai ancora scritto recensioni.</p>
                    </div>
                </div>
            </section>
 
        </div>
    </div>
 
    <script>
        // Carica dati utente dalla sessione
        async function caricaProfilo() {
            try {
                // Verifica se l'utente è autenticato
                const res = await fetch('/api/me');
                // Se non è autenticato, reindirizza alla pagina di login
                if (!res.ok) {
                    window.location.href = '/login.html';
                    return;
                }

                // Se è autenticato, mostra i suoi dati
                const user = await res.json();
                // Mostra iniziale del nome come avatar e nome completo
                const iniziale = (user?.name || 'U').charAt(0).toUpperCase();
                const nome = user
                    ? `${user.name || ''} ${user.surname || ''}`.trim()
                    : 'Utente';
                // Popola la sezione del profilo con i dati dell'utente
                document.getElementById('profilo-nome').innerHTML = `
                    <div class="rec-avatar avatar-profilo">${iniziale}</div> `
                
                document.getElementById('info-nome').textContent    = user.name    || '–';
                document.getElementById('info-cognome').textContent = user.surname || '–';
                document.getElementById('info-email').textContent   = user.email   || '–';
                // Dopo aver caricato i dati del profilo, carica le recensioni dell'utente
                caricaRecensioni();

            } catch (err) {
                console.error('Errore caricamento profilo:', err);
            }
        }
 
        // Carica recensioni dell'utente
        async function caricaRecensioni() {
            // Seleziona il container dove verranno mostrate le recensioni
            const container = document.getElementById('recensioni-container');
            try {
                // Effettua una richiesta per ottenere le recensioni scritte dall'utente
                const res = await fetch('/api/recensioni/mie');
                const recensioni = await res.json();
                // Se non ci sono recensioni, mostra uno stato vuoto con un messaggio informativo 
                if (!recensioni || recensioni.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">⭐</div>
                            <p>Non hai ancora scritto recensioni.</p>
                        </div>`;
                    return;
                }
                // Se ci sono recensioni, costruisce dinamicamente il contenuto HTML per ciascuna recensione e lo inserisce nel container tramite il join per concatenare le stringhe generate da map in un unico blocco HTML da inserire nella pagina
                /*  -recensioni è un array di oggetti recensione
                    -.map() scorr e ogni elemento uno alla volta
                    -r è la singola recensione corrente ad ogni iterazione quello che scrivi dopo 
                    -=> è ciò che viene restituito per quell'elemento*/
                container.innerHTML = recensioni.map(r =>
                // Crea una card per ogni recensione, con un link alla pagina del luogo recensito, mostrando il nome del locale, la data della recensione, la valutazione a stelle, eventuali dettagli aggiuntivi e il testo della recensione. Se il locale ha caratteristiche particolari (aperitivo o colazione), mostra dei tag distintivi.
                    ` <div class="recensione-card mb-2" onclick="window.location.href='/luogo.html?id=${r.luogo_id}&from=index'">
                        <div class="rec-header">
                            <span class="rec-locale">${r.location?.nome_locale || 'Locale'}</span>
                            <span class="rec-data">${formatData(r.created_at)}</span>
                        </div>
                        <div class="flex-column">
                            <div> ${stelle(r.voto)}</div>
                            <div> ${r.fascia_oraria ? `<strong>Fascia oraria:</strong> ${r.fascia_oraria}` : ''}</div>
                            <div> ${r.fornitura ? `<strong>Livello fornitura:</strong> ${r.fornitura} su 5` : ''}</div>
                        </div>
                        <p class="rec-testo">${r.testo || ''}</p>
                        ${r.location?.aperitivo ? `<span class="rec-tag">Aperitivo</span>` : ''}
                        ${r.location?.colazione ? `<span class="rec-tag">Colazione</span>` : ''}
                    </div> `).join('');
 
            } catch (err) {
                console.error('Errore caricaRecensioni:', err);
                // In caso di errore, mostra uno stato vuoto con un messaggio informativo
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⭐</div>
                        <p>Non hai ancora scritto recensioni.</p>
                    </div>`;
            }
        }
 
        // Funzione per generare la valutazione a stelle in base al voto numerico, restituendo un blocco HTML con 5 stelle, di cui alcune piene e altre vuote a seconda del voto
        function stelle(voto) {
            //arrotonda il voto al numero intero piu vicino e se voto è NaN o non definito restituisce 0
            const n = Math.round(voto) || 0;
            
            // Crea un array di 5 elementi e per ciascuno genera un'immagine di stella piena o vuota a seconda se l'indice è inferiore al numero di stelle piene da mostrare, poi unisce tutto in un'unica stringa HTML da restituire
            //_ è il valore corrente dell'elemento (non usato, quindi indicato con _), i è l'indice dell'elemento nell'array (da 0 a 4)
            return Array.from({ length: 5 }, (_, i) =>
                `<img src="/Foto/${i < n ? 'stella_piena' : 'stella_vuota'}.svg" 
                    width="18" height="18" alt="stella">`
            ).join('');
        }
        
        // Funzione per formattare la data in formato leggibile, restituendo una stringa con giorno, mese e anno in italiano
        function formatData(iso) {
            if (!iso) return '';
            return new Date(iso).toLocaleDateString('it-IT', {
                day: '2-digit', month: 'long', year: 'numeric'
            });
        }
 
        // LOGOUT
        // quando l'utente clicca il pulsante di logout, viene disconnesso e reindirizzato alla home del sito
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        });
 
        // AVVIO
        caricaProfilo();
    </script>
    
</body>
</html>
