<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
</head>

<body class="min-vh-100 d-flex align-items-center overflow-hidden">
    <div class="container-fluid">
        <div class="row align-items-center justify-content-center g-4">
            <div class="col-md-5 col-12 m-auto">
                <button class="homebtn border-0 bg-body p-4" onclick="window.location.href='index.html'"> </button>
                <img src="/Foto/APERETTO.png" alt="Logo Aperetto" class="img-fluid">
            </div>
            <div class="col-12 col-md-5 p-4 pt-5 pb-2 rounded-5 shadow border-black border mx-auto mt-5 d-flex flex-column">
                <form class="justify-content-sm-between">
                    <!-- campi da compilare -->
                    <div class="d-flex flex-column">
                        <input type="email" placeholder="E-Mail" class="form-control rounded-3">  <br>
                        <input type="password" placeholder="Password" class="form-control rounded-3">
                        <a href="#" class="link-info"> Password dimenticata? </a> <br>
                    </div>

                    <!-- bottoni -->
                    <button type="submit" class="btn btn-success mt-auto rounded-3 w-100"> Accedi </button>
                    <hr class="border-black">
                    <p class="text-center text-bg-info mb-1">Non hai un account?</p>
                    <a href="consumer.html" class="btn btn-danger rounded-3 w-100"> Registrati </a> <br>

                    <div class="text-start mt-2">
                        <a href="supplier.html" class="d-inline-flex align-items-center gap-2 text-dark">    
                            <span class="d-inline-flex justify-content-center align-items-center">
                                <img src="/Foto/supplier.svg" class="supplier d-block" alt="Icona ristoranti"> Per i ristoranti
                            </span>
                        </a>
                    </div>

                </form>
            </div>  
        </div>
    </div>
    
</body>
</html>
