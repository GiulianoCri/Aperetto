<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
</head>

<body class="overflow-x-hidden">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="container-fluid px-4">
    
            <div class="row align-items-center justify-content-center g-4">
                
            <!-- LATO DESTRO -->
                <div class="col-12 col-md-5 m-auto">
                    <button class="homebtn border-0 bg-body mt-4 p-4" onclick="window.location.href='index.html'"> </button>
                    <img src="/Foto/APERETTO.png" id="logoImg" alt="Logo Aperetto" class=" mt-0 img-fluid">
                </div>
            
            <!-- LATO SINISTRO -->
                <div class="col-12 col-md-5 me-5 mb-2">
                    
                    <div class="p-5 pb-2 rounded-5 shadow border-black border mx-auto mt-5" id="formContainer">
                        
                        <!-- FORM DI ACCESSO -->
                        <form class="justify-content-sm-between d-flex flex-column" id="formLogin">
                            <!-- campi da compilare -->
                            <div class="d-flex flex-column">
                                <input type="email" placeholder="E-Mail" id="emailLogin" class="form-control rounded-3">  <br>
                                
                                <div class="position-relative d-block w-100">
                                    <input type="password" placeholder="Password" id="pswField" class="form-control rounded-3 pe-5">
                                <!-- 
                                    bottone x mostra / nascondi password (bisogna aggiustare la posizione)
                                    <button type="button" class="position-absolute top-50 end-0 me-2 translate-middle-y bg-transparent border-0 p-0 lh-custom-0" id="showPsw">
                                        <img src="/Foto/eye-on.svg" width="18" alt="Mostra password">
                                    </button>
                                    <button type="button" class="d-none position-absolute top-50 end-0 me-2 translate-middle-y bg-transparent border-0 p-0 lh-custom-0" id="showPsw">
                                        <img src="/Foto/eye-off.svg" id="hidePswBtn" width="18" alt="Nascondi password">
                                    </button>    
                                -->
                                </div>
                                
                                <a href="#" id="forgotPsw" class="link-dark"> Password dimenticata? </a> <br>
                            </div>

                            <!-- bottoni -->
                            <button type="submit" class="btn btn-success mt-auto rounded-3 w-100"> Accedi </button>

                            <div class="d-flex align-items-center mt-5 mb-2">
                                <hr class="flex-grow-1 border-black m-0">
                                <span class="mx-3 text-bg-info">Non hai un account?</span>
                                <hr class="flex-grow-1 border-black m-0">
                            </div>

                            <a id="btnRegistrazione" class="btn btn-danger rounded-3 w-100"> Registrati </a> <br>

                            <div class="text-start mt-2 mb-3">
                                <a href="supplier.html"class="d-inline-flex align-items-center gap-2 text-dark">    
                                    <span class="d-inline-flex justify-content-center align-items-center">
                                        <img src="/Foto/supplier.svg" class="supplier d-block" alt="Icona ristoranti">
                                        <span class="mx-1 text-bg-info">Per i ristoranti</span>
                                    </span>
                                </a>
                            </div>
                        </form>

                        <!-- Password dimenticata -->
                        <div id="pswDimenticata" class="text-center d-none m-auto mb-4">
                            <button type="button" id="backLogin" class="arrow-back bg-body d-block my-auto"></button>
                            <div>
                                <h3 class="text-black d-inline">Hai dimenticato la password?</h3>
                                <p class="text-black">Fatti in culo</p>
                            </div>
                        </div>
                        
                        <!-- FORM DI REGISTRAZIONE -->
                        <form class="justify-content-sm-between d-flex flex-column d-none" id="formRegistrazione">
                            <button type="button" id="backLogin" class="arrow-back bg-body d-block my-auto"></button>
                            <h3 class="mb-4 text-center text-bg-info">Crea un account:</h3>
                                <div class="row g-2 mb-1">
                                    <div class="col-6">
                                        <input type="text" class="form-control rounded-3" id="name" placeholder="Nome" required>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" class="form-control rounded-3" id="surname" placeholder="Cognome" required>
                                    </div>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-12">
                                        <input type="email" class="form-control rounded-3" id="email" placeholder="E-Mail" required>
                                    </div>
                                </div>

                                <div class="row g-2 mb-1">
                                    <div class="col-12 input-group">
                                        <input type="password" class="form-control rounded-3" id="password" placeholder="Password" required>
                                    </div>
                                </div>
                                <div class="row g-2 mb-1">
                                    <div class="col-12">
                                        <input type="password" class="form-control rounded-3" id="confirm-psw" placeholder="Conferma Password" required>
                                    </div>
                                </div>

                                <div>
                                    <input type="checkbox" id="consensi" required>
                                    <label class="text-bg-info" >Acconsento al trattamento dei dati</label>
                                </div>

                                <div class="text-start mt-4">
                                <a href="supplier.html"class="d-inline-flex align-items-center gap-2 text-dark">    
                                    <span class="d-inline-flex justify-content-center align-items-center">
                                        <img src="/Foto/supplier.svg" class="supplier d-block" alt="Icona ristoranti">
                                        <span class="mx-1 text-bg-info">Per i ristoranti</span>
                                    </span>
                                </a>
                                </div>
                                
                                <div class="d-flex gap-3 align-items-center mb-4">
                                    <button type="submit" id="registrazione" class="btn btn-success m-auto w-100 mb-3"> Registrati</btn>
                                </div>
                        </form>

                        <!-- REGISTRAZIONE AVVENUTA -->
                        <div id="confirm" class="text-center m-auto d-none mb-4">
                            <img src="/Foto/confirm-log.png" class="confirm-success m-auto">
                            <div>
                                <h3 class="text-black d-inline">La tua </h3> 
                                <h3 class="text-success d-inline">registrazione</h3>
                                <h3 class="text-black d-inline"> è avvenuta con successo!</h3>
                            </div>

                            <a href="profilo.html" class="link-dark"> Visita il tuo profilo!</a>
                        </div>
                    </div>

                </div>  
            </div>
        </div>
    </div>

    <script>
    // serve a far comparire / scomparire il form per la registrazione
        const formLogin = document.getElementById('formLogin');
        const formRegistrazione = document.getElementById('formRegistrazione');

        const btnRegistrazione = document.getElementById('btnRegistrazione');
        const backLogin = document.getElementById('backLogin');

        const forgotPsw = document.getElementById('forgotPsw');
        const pswDimenticata = document.getElementById('pswDimenticata');

        btnRegistrazione.addEventListener('click', () => {
            formLogin.classList.add('d-none');
            formRegistrazione.classList.remove('d-none');
        });

        backLogin.addEventListener('click', () => {
            formRegistrazione.classList.add('d-none');
            formLogin.classList.remove('d-none');
        });

        // ancora da terminare
        pswDimenticata.addEventListener('click', () => {
            formLogin.classList.add('d-none');
            forgotPsw.classList.remove('d-none');
        });
    </script>

    <script>
        // mostra / nascondi password
        const showPswBtn = document.getElementById('showPswBtn');
        const hidePswBtn = document.getElementById('hidePswBtn');

        const pswField = document.getElementById('pswField');
        const changePsw = document.getElementById('changePsw');

        showPsw.addEventListener('click', () => {
            pswField.type = "text";
            showPswBtn.classList.add('d-none');
            hidePswBtn.classList.remove('d-none');
        });

        hidePsw.addEventListener('click', () => {
            pswField.type = "text";
            hidePswBtn.classList.add('d-none');
            showPswBtn.classList.remove('d-none');
        });
    </script>

    <script>
        formRegistrazione.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password');
            const confirmPsw = document.getElementById('confirm-psw');
            const confirm = document.getElementById('confirm');

            // confronto delle password
            if (password.value !== confirmPsw.value) {
                alert('Password non coincidenti');
                password.value = "";
                confirmPsw.value = "";
                return;
            }

            const risposta = await fetch('/api/registrazione', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome:     document.getElementById('name').value,
                    cognome:  document.getElementById('surname').value,
                    email:    document.getElementById('email').value,
                    password: password.value
                })
            });

            const dati = await risposta.json();

            if (risposta.ok) {
                formRegistrazione.classList.add('d-none');
                confirm.classList.remove('d-none');
            } else {
                alert('Errore: ' + dati.errore);
            }
        });
    </script>

    <script>
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();

            const risposta = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:    document.getElementById('emailLogin').value,
                    password: document.getElementById('pswField').value
                })
            });

            const dati = await risposta.json();

            if (risposta.ok) {
                window.location.href = '/index.html';
            } else {
                alert('Errore: ' + dati.errore);
            }
        });
    </script>

</body>

</body>
</html>
