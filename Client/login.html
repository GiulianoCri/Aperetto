<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
</head>

<body class="overflow-x-hidden">
    <div class="min-vh-100 d-flex align-items-center justify-content-center">
        <div class="container-fluid px-4">
    
            <div class="row align-items-center justify-content-center g-4">
                
            <!-- LATO DESTRO -->
                <div class="col-12 col-md-5 m-auto d-block">
                    <button class="backbtn back-black border-0 bg-body mt-4 p-4" onclick="window.location.href='index.html'"> </button>
                    <img src="/Foto/APERETTO.png" id="logoImg" alt="Logo Aperetto" class=" mt-0 img-fluid">
                </div>
            
            <!-- LATO SINISTRO -->
                <div class="col-12 col-md-5 me-5 mb-2">
                    
                    <div class="p-5 pb-2 rounded-5 shadow border-black border mx-auto mt-5" id="formContainer">
                        
                        <!-- FORM DI ACCESSO -->
                        <form class="justify-content-sm-between d-flex flex-column" id="formLogin">
                            <!-- campi da compilare -->
                            <div class="d-flex flex-column">
                                <input type="email" placeholder="E-Mail" id="emailLogin" class="form-control rounded-3">  <br>
                                
                                <div class="position-relative">
                                    <input type="password" placeholder="Password" id="pswField" class="form-control rounded-3 pe-5">
                                    
                                    <button type="button" id="showPswBtn" class="position-absolute border-0 p-0 psw-btn">
                                        <img src="/Foto/eye-on.svg" width="18" alt="Mostra password">
                                    </button>
                                    <button type="button" id="hidePswBtn" class="position-absolute border-0 p-0 psw-btn d-none">
                                        <img src="/Foto/eye-off.svg" width="18" alt="Nascondi password">
                                    </button>
                                </div>
                                
                                <a href="#" id="forgotPsw" class="link-dark"> Password dimenticata? </a> <br>
                            </div>

                            <!-- bottoni -->
                            <button type="submit" class="btn btn-success mt-auto rounded-3 w-100"> Accedi </button>

                            <div class="d-flex align-items-center mt-5 mb-2">
                                <hr class="flex-grow-1 border-black m-0">
                                <span class="mx-3 text-bg-info">Non hai un account?</span>
                                <hr class="flex-grow-1 border-black m-0">
                            </div>

                            <a id="btnRegistrazione" class="btn btn-danger rounded-3 w-100"> Registrati </a> <br>

                            <div class="text-start mt-2 mb-3">
                                <a href="supplier.html"class="d-inline-flex align-items-center gap-2 text-dark">    
                                    <span class="d-inline-flex justify-content-center align-items-center">
                                        <img src="/Foto/supplier.svg" class="supplier d-block" alt="Icona ristoranti">
                                        <span class="mx-1 text-bg-info">Per i locali</span>
                                    </span>
                                </a>
                            </div>
                        </form>

                        <!-- Password dimenticata -->
                        <div id="pswDimenticata" class="text-center d-none m-auto mb-4">
                            <button type="button" id="backAccess" class="arrow-back bg-body d-block my-auto"></button>
                            <div>
                                <h3 class="text-black d-inline">Hai dimenticato la password?</h3>
                                <p class="text-black">Fatti in culo</p>
                            </div>
                        </div>
                        
                        <!-- FORM DI REGISTRAZIONE -->
                        <form class="justify-content-sm-between d-flex flex-column d-none" id="formRegistrazione">
                            <button type="button" id="backLogin" class="backbtn back-black bg-body d-block my-auto"></button>
                            <h2 class="mb-4 text-center text-bg-info">Benvenuto su Aperetto!</h2>
                                <div class="row g-2 mb-1">
                                    <div class="col-6">
                                        <input type="text" class="form-control rounded-3" id="name" placeholder="Nome" required>
                                    </div>
                                    <div class="col-6">
                                        <input type="text" class="form-control rounded-3" id="surname" placeholder="Cognome" required>
                                    </div>
                                </div>
                                <div class="row g-2 mb-3">
                                    <div class="col-12">
                                        <input type="email" class="form-control rounded-3" id="email" placeholder="E-Mail" required>
                                    </div>
                                </div>

                                <div class="mb-1 position-relative">
                                    <input type="password" placeholder="Password" id="password" class="form-control rounded-3 pe-5">
                                    
                                    <button type="button" id="showPsw-reg" class="position-absolute border-0 p-0 psw-btn">
                                        <img src="/Foto/eye-on.svg" width="18" alt="Mostra password">
                                    </button>
                                    <button type="button" id="hidePsw-reg" class="position-absolute border-0 p-0 psw-btn d-none">
                                        <img src="/Foto/eye-off.svg" width="18" alt="Nascondi password">
                                    </button>
                                </div>

                                <div class="mb-1 position-relative">
                                    <input type="password" class="form-control rounded-3" id="confirm-psw" placeholder="Conferma Password" required>
                                    
                                    <button type="button" id="showConf" class="position-absolute border-0 p-0 psw-btn">
                                        <img src="/Foto/eye-on.svg" width="18" alt="Mostra password">
                                    </button>
                                    <button type="button" id="hideConf" class="position-absolute border-0 p-0 psw-btn d-none">
                                        <img src="/Foto/eye-off.svg" width="18" alt="Nascondi password">
                                    </button>
                                </div>


                                <div>
                                    <input type="checkbox" id="consensi" required>
                                    <label class="text-bg-info" >Acconsento al trattamento dei dati</label>
                                </div>

                                <div class="text-start mt-4">
                                <a href="supplier.html"class="d-inline-flex align-items-center gap-2 text-dark">    
                                    <span class="d-inline-flex justify-content-center align-items-center">
                                        <img src="/Foto/supplier.svg" class="supplier d-block" alt="Icona ristoranti">
                                        <span class="mx-1 text-bg-info">Per i locali</span>
                                    </span>
                                </a>
                                </div>
                                
                                <div class="d-flex gap-3 align-items-center mb-4">
                                    <button type="submit" id="registrazione" class="btn btn-success m-auto w-100 mb-3"> Registrati</button>
                                </div>
                        </form>

                        <!-- REGISTRAZIONE AVVENUTA -->
                        <div id="confirm" class="text-center m-auto d-none mb-4">
                            <img src="/Foto/confirm-log.png" class="confirm-success m-auto">
                            <div>
                                <h3 class="text-black d-inline">La tua </h3> 
                                <h3 class="text-success d-inline">registrazione</h3>
                                <h3 class="text-black d-inline"> è avvenuta con successo!</h3>
                            </div>

                            <a href="profilo.html" class="link-dark"> Visita il tuo profilo!</a>
                        </div>
                    </div>

                </div>  
            </div>
        </div>
    </div>

    <script>
    // serve a far comparire / scomparire il form per la registrazione
        const formLogin = document.getElementById('formLogin');
        const formRegistrazione = document.getElementById('formRegistrazione');

        const btnRegistrazione = document.getElementById('btnRegistrazione');
        const backLogin = document.getElementById('backLogin');

        const forgotPsw = document.getElementById('forgotPsw');
        const pswDimenticata = document.getElementById('pswDimenticata');
        const backAccess = document.getElementById('backAccess');

        btnRegistrazione.addEventListener('click', () => {
            formLogin.classList.add('d-none');
            formRegistrazione.classList.remove('d-none');
        });

        backLogin.addEventListener('click', () => {
            formRegistrazione.classList.add('d-none');
            formLogin.classList.remove('d-none');
        });


        forgotPsw.addEventListener('click', (e) => {
            e.preventDefault();
            formLogin.classList.add('d-none');
            pswDimenticata.classList.remove('d-none');
        });

        backAccess.addEventListener('click', () => {
            pswDimenticata.classList.add('d-none');
            formLogin.classList.remove('d-none');
        });
    </script>

    <script>
        // mostra / nascondi password
        // PAGINA DI ACCESSO
        const showPswBtn = document.getElementById('showPswBtn');
        const hidePswBtn = document.getElementById('hidePswBtn');
        const pswField   = document.getElementById('pswField');

        showPswBtn.addEventListener('click', () => {
            pswField.type = 'text';
            showPswBtn.classList.add('d-none');
            hidePswBtn.classList.remove('d-none');
            hidePswBtn.classList.add('d-block');
        });

        hidePswBtn.addEventListener('click', () => {
            pswField.type = 'password';
            hidePswBtn.classList.add('d-none');
            showPswBtn.classList.remove('d-none');
            showPswBtn.classList.add('d-block');
        });

        // PAGINA DI REGISTRAZIONE
        const showPswReg = document.getElementById('showPsw-reg');
        const hidePswReg = document.getElementById('hidePsw-reg');
        const password = document.getElementById('password');

        showPswReg.addEventListener('click', () => {
            password.type = 'text';
            showPswReg.classList.add('d-none');
            hidePswReg.classList.remove('d-none');
            hidePswReg.classList.add('d-block');
        });

        hidePswReg.addEventListener('click', () => {
            password.type = 'password';
            hidePswReg.classList.add('d-none');
            showPswReg.classList.remove('d-none');
            showPswReg.classList.add('d-block');
        });

        // PAGINA DI CONFERMA
        const showConf = document.getElementById('showConf');
        const hideConf = document.getElementById('hideConf');
        const confPsw = document.getElementById('confirm-psw');

        showConf.addEventListener('click', () => {
            confPsw.type = 'text';
            showConf.classList.add('d-none');
            hideConf.classList.remove('d-none');
            hideConf.classList.add('d-block');
        });

        hideConf.addEventListener('click', () => {
            confPsw.type = 'password';
            hideConf.classList.add('d-none');
            showConf.classList.remove('d-none');
            showConf.classList.add('d-block');
        });
    </script>


    <script>
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();

            const risposta = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:    document.getElementById('emailLogin').value,
                    password: document.getElementById('pswField').value
                })
            });

            const dati = await risposta.json();

            if (risposta.ok) {
                window.location.href = '/index.html';
            } else {
                alert('Errore: ' + dati.errore);
            }
        });
    </script>

    <!-- REGISTRAZIONE DATI NEL DB -->
    <script>
        document.getElementById('formRegistrazione').addEventListener('submit', async (e) => {
            e.preventDefault();  //serve ad evitare che il browser faccia il refresh della pagina dopo aver inviato un form (comportamento di default)

            //prendiamo i dati utente dal form
            //const username = document.getElementById('username').value;
            const name = document.getElementById('name').value;
            const surname = document.getElementById('surname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-psw');

            // schermata di registrazione confermata
            const confirm = document.getElementById('confirm');


            console.log("sto per fare una richiesta per: "+ email +", " + password + ", "+ confirmPassword)

            // controllo lunghezza della password (almeno 8 char)
            // IMPORTANTE: questo controllo deve essere fatto anche lato server.
            if(password.length < 8){
                alert("La passwrod deve essere lunga almeno 8 caratteri")
                return 
            }
            // confronto delle password
            if(password !== confirmPassword.value){
                alert("Le password inserite sono diverse")
                confirmPassword.value = "";
                return
            }
            
            console.log("Dati inviati:", { name, surname, email, password });

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, surname, email, password})
                });

                /*
                Convenzionalmente le chiamate di login e registrazione sono di tipo post.
                IMPORTANTE: non posso passare i dati utente (soprattutto la password) nella URL, ma devo usare il body. Non devo criptare password perche ci pensa già HTTPS.
                */

                const data = await response.json();

                if (response.ok) {    
                    formRegistrazione.classList.add('d-none');
                    confirm.classList.remove('d-none');
                    //alert(data.message + "user email: " + data.user.email)  
                    
                } else {
                    alert(data.error)
                }
            } catch (err) {
                console.error("Errore di rete:", err);
                alert("Errore di connessione al server")
            }
        });
    </script>

</body>

</html>
