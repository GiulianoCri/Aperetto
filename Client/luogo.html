<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caricamento...</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js è una libreria JavaScript per la creazione di grafici-->
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar-custom d-flex fixed-top align-items-center gap-3 px-3">
        <img src="/Foto/APERETTO (1).png" alt="Logo Aperetto" class="mx-1 logo">
        <div style="flex:1"></div>
        <!-- Menu a tendina per login/profilo/logout -->
        <!--posizionato rispetto al flusso degli altri elementi-->
        <div class="position-relative">
            <button class="loginbtn rounded-circle border-0 p-0"></button>
            <div class="dropdown rounded-4 flex-column d-flex">
                <!-- Mostrato se NON loggato -->
                <a href="login.html" class="text-dark m-auto" id="menuAccedi">Accedi</a>
                <!-- Mostrati se loggato -->
                <a href="profilo.html" class="text-dark m-auto d-none" id="menuProfilo">Profilo</a>
                <a href="#" class="text-dark m-auto d-none" id="menuLogout">Logout</a>
            </div>
        </div>
    </div>

    <!-- banner -->
    <div class="luogo-banner" id="banner">
        <div class="banner-skeleton"></div>
    </div>

    <!-- BODY PAGINA -->
    <div class="luogo-body" id="luogo-body">
        <p class="loading-txt">Caricamento...</p>
    </div>

    <!-- notifica -->
    <div class="notifica-wrap" id="notificaWrap"></div>

    <script>
        // NAVBAR DROPDOWN MENU
        // menù "a tendina" per accesso / logout / profilo user: cambia in base allo stato di login dell'user
        //  -> se utente non loggato, viene mostrato SOLO il pulsante "Accedi"
        //  -> se utente loggato, vengono mostrati i pulsanti "Profilo" e "Logout"
        const btn  = document.querySelector('.loginbtn');
        const menu = document.querySelector('.dropdown');
        btn.addEventListener('click', () => menu.classList.toggle('show'));
        document.addEventListener('click', e => {
            if (!btn.contains(e.target) && !menu.contains(e.target))
                menu.classList.remove('show');
        });

        // SESSIONE
        // viene controllato se l'utente ha effettuato il login e risulta attualmente loggato al sito: nel caso in cui questo controllo
        // dovesse avere esito negativo, allora viene mostrato il solo pulsante di accesso nel menù a tendina e l'invito ad accedere per
        // scrivere una recensione
        let utenteLoggato = null;
        async function checkLogin() {
            try {
                const r = await fetch('/api/me');
                if (r.ok) {
                    utenteLoggato = await r.json();
                    // LOGGATO: mostra i pulsante per accedere al profilo utente e per il logout
                    document.getElementById('menuAccedi').classList.add('d-none');
                    document.getElementById('menuProfilo').classList.remove('d-none');
                    document.getElementById('menuLogout').classList.remove('d-none');
                } else {
                    // NON LOGGATO: ripristina lo stato di default del menù, mostrando solo il pulsante "Accedi"
                    menuAccedi.classList.remove('d-none');
                    menuProfilo.classList.add('d-none');
                    menuLogout.classList.add('d-none');
                }
            } catch {}
        }

        // LOGOUT
        // se dal menù a tendina viene premuto logout, l'utente viene disconnesso e reindirizzato alla homepage del sito
        document.getElementById('menuLogout').addEventListener('click', async e => {
        e.preventDefault();
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = '/';
    });

        // UTILS
        const formattaOrario = o => {
            if (!o) return 'N/A';
            const [h, m] = o.split(':');
            return `${h}:${m}`;
        };

        // converte una data in formato ISO in una stringa formattata in italiano (es. 21 mag 2026)
        const formattaData = iso => new Date(iso).toLocaleDateString('it-IT', {
            day: '2-digit', month: 'short', year: 'numeric'
        });

        // Funzione per generare la valutazione a stelle in base al voto numerico, restituendo un blocco HTML con 5 stelle, di cui 
        // alcune piene e altre vuote a seconda del voto
        function stelleSVG(totale, piene) {
            // in base al numero preso in input 'piene', viene confrontato l'indice della stella corrente con il valore di 'piene'
            // se minore o uguale la stella vuota viene riempita, altrimenti rimane vuota
            return Array.from({ length: totale }, (_, i) => `<img src="/Foto/${i < piene ? 'stella_piena' : 'stella_vuota'}.svg" 
                    width="18" height="18" alt="stella">`).join('');
        }

        // permette di mostrare notifiche temporanee (circa 3 secondi) in basso a destra
        // serve per mostrare messaggi di errore o di successo all'utente: viene utilizzata, per esempio, per notificare la corretta
        // pubblicazione di una recensione, oppure per segnalare un errore in caso di problemi (la troviamo anche nelle altre pagine)
        function mostranotifica(msg, tipo = 'ok') {
            const wrap = document.getElementById('notificaWrap');
            const t = document.createElement('div');
            t.className = 'ap-notifica' + (tipo === 'error' ? ' error' : '');
            t.textContent = msg;
            wrap.appendChild(t);
            setTimeout(() => t.remove(), 3100);
        }

        // STELLE INTERATTIVE
        let votoSelezionato = 0;

        // la funzione seguente gestisce la valutazione tramite stelle interattive con tre componenti distinti
        function initStelle() {
            const btns = document.querySelectorAll('.stella-btn');
            btns.forEach((b, i) => {
                // MOUSEENTER - hover in "entrata"
                // quando il mouse "entra" su una stella 'i', viene aggiunta la classe 'hov' a tutte le stelle dalla prima fino a quella
                // con indice corretne creando l'effetto di anteprima del voto assegnato
                b.addEventListener('mouseenter', () =>
                    btns.forEach((bb, j) => bb.classList.toggle('hov', j <= i))
                );

                // MOUSELEAVE - hover in "uscita"
                // quando il mouse "esce", viene fatto il contrario di quanto fatto nella sezione precedente: viene rimossa la classe 'hov'
                // da tutte le stelle fino alla posizione i-esima (posizione del puntatore)
                b.addEventListener('mouseleave', () =>
                    btns.forEach((bb, j) => {
                        bb.classList.remove('hov');
                        bb.classList.toggle('sel', j < votoSelezionato);
                    })
                );

                // CLICK - selezione del voto
                // una volta eseguito il 'click', il voto diventa "statico": tutte le stelle precendeti a quella cliccata diventano piene
                // andando a salvare il voto all'interno della variabile 'votoSelezionato'
                b.addEventListener('click', () => {
                    votoSelezionato = i + 1;
                    btns.forEach((bb, j) => bb.classList.toggle('sel', j < votoSelezionato));
                });
            });
        }

        // RECENSIONI 
        // viene inviata una richiesta al server per 'recuperare' tutte le recensioni di un determinato locale partendo dal suo ID
        //  -> se la richiesta viene eseguita con successo, viene restituito un array di recensioni
        //  -> se la richiesta fallisce per un qualsiasi motivo, viene restituito un array vuoto e non viene modifcato lo stato di dafault della pagina
        //      (viene mostrato "Ancora nessuna recensione. Sii il primo!")
        async function caricaRecensioni(idLuogo) {
            try {
                const r = await fetch(`/api/recensioni/luogo/${idLuogo}`);
                return r.ok ? await r.json() : [];
            } catch { return []; }
        }

        // la funzione costruisce ed inserisce all'interno del DOM l'html di tutte le recensioni
        function renderRecensioni(recensioni) {
            const wrap = document.getElementById('recensioniList');
            // viene fatto un controllo iniziale sui casi "limite" vedendo se esiste il contenitore della pagina (wrap) e se sono presenti recensioni per 
            // il locale in questione -> nel caso in cui non dovessero esserci abbiamo un messaggio di default
            if (!wrap) return;
            if (!recensioni.length) {
                wrap.innerHTML = `
                    <div class="rec-empty">
                        <span>💬</span>
                        Ancora nessuna recensione. Sii il primo!
                    </div>`;
                return;
            }

            // se sono presenti delle recensioni e il wrap esiste, allora procediamo con la costruzione e l'inserimento di tutte le recensioni del locale
            wrap.innerHTML = recensioni.map((rec, idx) => {
                // per ogni recensione viene inserito l'avatar dell'utente (iniziale del nome) ed il nome, seguito da tutte le informazioni per la recensione
                // se tra i dati sono presenti anche 'fascia_oraria' e 'fornitura' allora vengono inseriti anche tali parametri
                //  -> non viene fatto il controllo sulla presenza / assenza di entrambi in contemporanea perchè viene già fatto al momento dell'inserimento
                const iniziale = (rec.consumer?.name || 'U').charAt(0).toUpperCase();
                const nome = rec.consumer
                    ? `${rec.consumer.name || ''} ${rec.consumer.surname || ''}`.trim()
                    : 'Utente';
                return `
                <div class="rec-item" style="animation-delay:${idx * 0.07}s">
                    <div class="rec-item-header">
                        <div class="rec-utente">
                            <div class="rec-avatar avatar-size">${iniziale}</div>
                            ${nome}
                        </div>
                        <span class="rec-data-txt">${formattaData(rec.created_at)}</span>
                    </div>
                    <div class="stelle-show">${stelleSVG(5, rec.voto)}</div>
                    <div> ${rec.fascia_oraria ? `<strong>Fascia oraria:</strong> ${rec.fascia_oraria}` : ''}</div>
                    <div> ${rec.fornitura ? `<strong>Livello fornitura:</strong> ${rec.fornitura} su 5` : ''}</div>
                    <p class="rec-testo-item">${rec.testo || ''}</p>
                </div>`;
            }).join('');
        }

        // AGGIORNAMENTO IN TEMPO REALE
        // la funzione seguente serve ad aggiornare in tempo reale le "statistiche" del locale subito dopo aver inserito una recensione
        function aggiornaMedia(recensioni) {
            // vengono recuperati dal DOM la media voto, il numero di stelle e il numero di recensioni fatte
            const elNum = document.getElementById('mediaVoto');
            const elStel = document.getElementById('mediaStelle');
            const elCount = document.getElementById('votoCount');
            
            // vengono gestiti i casi limite
            // il DOM ancora non è "pronto"
            if (!elNum) return;
            // non sono presenti recensioni: in questo caso vengono iseriti valori di default al posto delle statistiche
            if (!recensioni.length) {
                elNum.textContent = '—';
                elStel.innerHTML = stelleSVG(5, 0);
                elCount.textContent = '0 recensioni';
                return;
            }

            // se non ci sono casi limite, allora si procede a calcolare la media voto facendo la somma tramite la funzione 'reduce' e dividendo
            // per il numero di recensioni 
            const media = recensioni.reduce((s, r) => s + r.voto, 0) / recensioni.length;
            // il valore che viene fuori dalla riga precedente viene ottimizzato riducendo il numero di cifre decimali ad una sola
            elNum.textContent   = media.toFixed(1);
            // in base al valore venuto fuori da media, viene arrotondato e vengono "colorate" le stelle corrispondenti
            elStel.innerHTML    = stelleSVG(5, Math.round(media));
            // serve semplicemente a gestire il plurale / singolare
            elCount.textContent = `${recensioni.length} recension${recensioni.length === 1 ? 'e' : 'i'}`;
        }


        let aperturaCorrente = null;
        let chiusuraColazioneCorrente = null;
        let chartFornituraInstance = null;

        // INVIO NUOVA RECENSIONE
        // la seguente funzione è il centro nevralgico di questa pagina: serve a validare ed inviare una nuova recensione e, successivamente,
        // ad aggiornare tutti i campi della pagina considerando anche tale recensione appena aggiunta
        async function inviaRecensione(idLuogo) {
            const testo = document.getElementById('recTesto').value.trim();
            // se il voto non è stato selezionato viene mostrata una notifica
            if (!votoSelezionato) { mostranotifica('Seleziona un voto ⭐', 'error'); return; }

            const btnInvia = document.getElementById('btnInviaRec');
            btnInvia.disabled = true;
            btnInvia.textContent = 'Invio...';
           
            // VALIDAZIONE CAMPI
            // vengono fatti i controlli su fornitura e fascia_oraria: vengono presi gli elementi dal DOM e successivamente controllati
            const fornitura = parseInt(document.getElementById('fornituraSlider')?.value ?? 0);
            const fascia_oraria = document.querySelector('.fascia-btn.selected')?.getAttribute('data-fascia') || null;

            // se è presente il livello di fornitura, allora DEVE essere presente anche la fascia oraria e viceversa
            if ((fornitura && !fascia_oraria) || (!fornitura && fascia_oraria)) {
                // nel caso in cui uno dei due non dovesse esser selezionato, viene bloccato l'invio della recensione e viene mostrato un alert
                mostranotifica('Devi selezionare sia il livello di fornitura che la fascia oraria!' , 'error');
                btnInvia.disabled = false;
                btnInvia.textContent = 'Pubblica';
                return;
            }

            try {
                // viene fatta una richiesta POST per la recensione appena scritta
                const r = await fetch('/api/recensioni', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        luogo_id: idLuogo,
                        voto: votoSelezionato,
                        fornitura: parseInt(document.getElementById('fornituraSlider')?.value ?? 0),
                        fascia_oraria: document.querySelector('.fascia-btn.selected')?.getAttribute('data-fascia') || null,
                        testo
                    })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || 'Errore');

                // RESET SLIDER E FASCIA ORARIA
                // una volta inviata la recensione, viene msotrata una notifica di successo ed è possibile visualizzare la propria recensione 
                // nell'elenco sotto il form; successivamente, vengono resettati TUTTI i campi del form, preparandolo per una nuova eventuale recensione
                mostranotifica('Recensione pubblicata! 🎉');
                document.getElementById('recTesto').value = '';
                const slider = document.getElementById('fornituraSlider');
                if(slider) {
                    slider.value = 1;
                    slider.style.background = 'linear-gradient(to right, #FFC107 0%, #e9ecef 0%)';
                    document.getElementById('fornituraValore').textContent = '1';
                }
                document.querySelectorAll('.fascia-btn').forEach(b => b.classList.remove('selected'));

                // vengono chiamate tutte le funzioni per l'aggiornamento della pagina
                // 1. viene chiamata la funzione per il caricamento delle recensioni, passando come argomento l'id del locale corrente, quindi viene chiamata
                //    la funzione per il render delle recensioni
                const nuove = await caricaRecensioni(idLuogo);
                renderRecensioni(nuove);
                // 2. viene chiamata la funzione per l'aggiornamento della valutazione del locale
                aggiornaMedia(nuove);
                // 3. viene chiamata la funzione per il render del grafico del livello di fornitura
                renderChartFornitura(nuove, aperturaCorrente, chiusuraColazioneCorrente);

                votoSelezionato = 0;
                document.querySelectorAll('.stella-btn').forEach(b => b.classList.remove('sel', 'hov'));

            } catch (err) {
                mostranotifica(err.message, 'error');
            } finally {
                // una volta completata con successo la richiesta di invio della notifica, viene riabilitato il pulsante di invio
                btnInvia.disabled = false;
                btnInvia.textContent = 'Pubblica';
            }
        }

        // CREA FASCE ORARIE
        // la funzione va a generare delle fasce orarie di 1h/fascia utili poi alle recensioni (riservate ai soli locali che forniscono 
        // il servizio di colazione) e al render del grafico relativo alla fornitura
        function generaFasceOrarie(apertura, chiusura) {
            // caso limite: non sono presenti orario di apertura e/o chiusura
            if (!apertura || !chiusura) return [];
            
            // identifica l'orario di apertura e chiusura del locale e lo divido in due parti (ora - h e minuti - m)
            const fasce = [];
            let [hA, mA] = apertura.split(':').map(Number);
            let [hC, mC] = chiusura.split(':').map(Number);

            // gestisce orari a cavallo della mezzanotte: se l'orario di chiusura è successivo alla mezzanotte va ad aggiungere 24 
            // in modo da rendere il calcolo lineare
            if (hC < hA || (hC === hA && mC <= mA)) hC += 24;
            // converto l'orario in minuti
            let current = hA * 60 + mA;
            const end = hC * 60 + mC;

            // finchè c'è spazio, avanza di 60 minuti per fascia riportando l'orario nel formato 24 ore (00:00 - 23:59)
            while (current + 60 <= end) {
                const hStart = Math.floor(current / 60) % 24;
                const hEnd   = Math.floor((current + 60) / 60) % 24;
                // 'padStart() gestisce la formattazione dell'orario aggiungendo uno zero all'inizio
                fasce.push(`${String(hStart).padStart(2,'0')}:00 – ${String(hEnd).padStart(2,'0')}:00`);
                current += 60;
            }

            return fasce;
        }

        // CARICA TUTTO
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const from = params.get('from');
        if (!id) window.location.href = '/';

        // serve alla creazione del grafico vero e proprio per le forniture
        function renderChartFornitura(recensioni, apertura, chiusuraColazione) {
            // controllo esistenza del canvas
            const canvas = document.getElementById('chartFornitura');
            if (!canvas) return;

            console.log('apertura:', apertura, '| chiusura:', chiusuraColazione);
            console.log('fasce generate:', generaFasceOrarie(apertura, chiusuraColazione));

            // se il canvas esiste, viene "distrutto" e viene posto a "null"
            if (chartFornituraInstance) {
                chartFornituraInstance.destroy();
                chartFornituraInstance = null;
            }

            const fasce = generaFasceOrarie(apertura, chiusuraColazione);

            // raggruppa le recensioni per fascia oraria e va a calcolare la media di fornitura (valori da 1 a 5)
            const gruppi = {};
            recensioni.forEach(r => {
                // vengono saltate le recensioni senza fascia oraria o fornitura
                //  -> affinchè la recensione sia valida devono essere presenti sia la fascia_oraria che la fornitura
                if (!r.fascia_oraria || r.fornitura == null) return;
                // costruisce un oggetto 'gruppi' dove ogni chiave è una fascia oraria
                if (!gruppi[r.fascia_oraria]) gruppi[r.fascia_oraria] = { somma: 0, count: 0 };
                gruppi[r.fascia_oraria].somma += r.fornitura;
                gruppi[r.fascia_oraria].count += 1;
            });

            // ordina le fasce cronologicamente
            const labels = fasce;
            const valori = labels.map(f => gruppi[f] ? (gruppi[f].somma / gruppi[f].count).toFixed(1) : null);
            const conteggi = labels.map(f => gruppi[f]?.count ?? 0);

            // creazione del canvas che verrà inserito poi in ogni pagina del locale
            chartFornituraInstance = new Chart(canvas, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Media fornitura',
                        data: valori,
                        backgroundColor: labels.map(f => gruppi[f] ? 'rgba(255, 193, 7, 0.3)' : 'rgba(233, 236, 239, 0.25)'),
                        borderColor: labels.map(f => gruppi[f] ? '#FFC107' : '#e9ecef'),
                        borderWidth: 2,
                        borderRadius: 8,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }, // nasconde legenda
                        tooltip: {
                            callbacks: {
                                // quando viene passato il mouse sopra / viene cliccata la colonnina relativa al grado di fornitura 
                                // viene mostrato un riquadro con ORARIO, la MEDIA e il N. DI RECENSIONI
                                label: (ctx) => ctx.raw !== null ? `Media: ${ctx.raw}/5` : 'Nessuna recensione',
                                afterLabel: (ctx) => conteggi[ctx.dataIndex] > 0 ? `Recensioni: ${conteggi[ctx.dataIndex]}` : ''
                            }
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 5,
                            ticks: { stepSize: 1, callback: v => `${v}` },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        async function caricaDettaglio() {
            // controllo sessione
            await checkLogin();

            try {
                const [resLuogo, recensioni] = await Promise.all([
                    fetch(`/api/location/${id}`),
                    caricaRecensioni(id)
                ]);

                if (!resLuogo.ok) throw new Error();
                const luogo = await resLuogo.json();
                document.title = `${luogo.nome_locale} - Aperetto`;

                // calcolo della media voto di tutte le recensioni
                const mediaVal = recensioni.length
                    ? (recensioni.reduce((s, r) => s + r.voto, 0) / recensioni.length)
                    : null;

                // BANNER
                // viene presa l'immagine di sfondo del colare e vengono "inseriti" nome e tag dei servizi offerti
                document.getElementById('banner').innerHTML = `
                    ${from === 'index' ? `<button class="btn-back-banner" onclick="history.back()">← Torna alla lista</button>` : ''}
                    <img src="${luogo.immagine}" alt="${luogo.nome_locale}" loading="lazy">
                    <div class="banner-overlay">
                        <div class="banner-badge-wrap">
                            ${luogo.aperitivo ? `<div class="banner-badge">Aperitivo</div>` : ''}
                            ${luogo.colazione ? `<div class="banner-badge">Colazione</div>` : ''}
                        </div>
                        <h1 class="banner-nome">${luogo.nome_locale}</h1>
                    </div>`;
                
                // viene calcolato l'orario limite per il servizio di colazione
                //  -> se l'orario di chiusura del locale è antecedente alle 13:00, allora viene utilizzato l'orario di chiusura
                //  -> se l'orario di chiusura del locale è successivo alle 13:00, allora viene impostato come orario limite le 13:00
                const chiusuraColazione = (() => {
                    const h = parseInt(luogo.chiusura.split(':')[0], 10);
                    console.log('chiusura dal DB:', luogo.chiusura, '| h parsed:', h);
                    return h < 14 ? '14:00' : luogo.chiusura.substring(0,5);
                })();

                // registro l'orario limite in una variabile locale e salvo anche l'orario di apertura
                chiusuraColazioneCorrente = chiusuraColazione;
                aperturaCorrente = luogo.apertura.substring(0, 5);

                // chiamo la funzione per generare fase orarie, dalla quale poi vado a creare tutti i pulsanti da inserire nella sezione "Colazione"
                // del form per le recensioni
                const fasce = generaFasceOrarie(aperturaCorrente, chiusuraColazioneCorrente);
                const fasceOrarie = fasce.length
                    ? fasce.map(f => `<button type="button" class="fascia-btn" data-fascia="${f}">${f}</button>`).join('')
                    : `<span style="font-size:0.82rem;color:#bbb;">Orari non disponibili</span>`;

                // SEZIONE FORM RECENSIONE (mostrato solo se utente loggato)
                // se un utente non è loggato, viene mostrato un messaggio che invita ad accedere per lasciare una recensione
                // le recensioni sono sempre visibili, anche agli utenti non loggati / registrati
                const formSection = utenteLoggato ? `
                    <div class="voto-fornitura-row">
                        <div>
                            <p class="rec-form-label">Il tuo voto</p>
                            <div class="stelle-rating" id="stelleInput">
                                ${[1,2,3,4,5].map(n => `
                                <button class="stella-btn" aria-label="${n} stelle">
                                    <svg class="stella-svg" viewBox="0 0 24 24">
                                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88
                                                L12 17.77l-6.18 3.25L7 14.14 2 9.27
                                                l6.91-1.01L12 2z"/>
                                    </svg>
                                </button>`).join('')}
                            </div>
                        </div>
                    </div>

                    ${luogo.colazione ? `
                    <div class="colazione-sub">
                        <p class="colazione-sub-title">COLAZIONE</p>
                        <div class="colazione-sub-row">
                            <div>
                                <p class="rec-form-label">Fascia oraria</p>
                                <div class="fascia-grid mt-2">
                                    ${fasceOrarie}
                                </div>
                            </div>
                            <div class="fornitura-wrap">
                                <p class="rec-form-label">Quanto era fornito?</p>
                                <div class="fornitura-header">
                                    <span style="font-size:0.78rem;font-weight:700;color:#888;">Livello fornitura</span>
                                    <span class="fornitura-valore" id="fornituraValore">1</span>
                                </div>
                                <input type="range" class="fornitura-slider" id="fornituraSlider"
                                    min="1" max="5" step="1" value="1">
                                <div class="fornitura-labels">
                                    <span>Scarso</span>
                                    <span>Ottimo</span>
                                </div>
                            </div>
                        </div>
                    </div>` : ''}

                    <textarea class="rec-textarea mt-2" id="recTesto"
                        placeholder="Racconta la tua esperienza…"></textarea>
                        <div class="d-flex justify-content-end">
                            <button class="btn-invia-rec mt-1 mb-3" id="btnInviaRec">Pubblica</button>
                        </div>
                    
                ` : `
                    <div class="login-prompt">
                        <span>🔐</span>
                        <span><a href="/login.html">Accedi</a> per lasciare una recensione</span>
                    </div>`;

                // SOCIAL
                // nella sidebar del locale vengono mostrati link cliccabili per il sito web del locale e per il suo profilo Instagram (se presenti)
                // andiamo a pushare all'interno dell'array 'socials' tutti i riferimenti presenti (se non sono stati inseriti dall'admin l'array
                // sarà vuoto e non verrà mostrato nulla)
                const socials = [];
                if (luogo.sito_web) socials.push(`    
                    <span class="info-pill-value">
                        ${luogo.sito_web
                            ? `<a href="${luogo.sito_web}" target="_blank" rel="noopener" class="d-inline-flex align-items-center gap-1">
                                    <img src="/Foto/web.svg" alt="Sito Web" class="info-icons">
                                    Visita il sito
                                </a>` : 'N/A'}
                    </span>`);
                    
                if (luogo.instagram) socials.push(`
                    <span class="info-pill-value">
                        ${luogo.instagram
                            ? `<a href="https://www.instagram.com/${luogo.instagram}/" target="_blank" rel="noopener" class="d-inline-flex align-items-center gap-1">
                                    <img src="/Foto/instagram-icon.svg" alt="Instagram" class="info-icons">
                                    Instagram
                                </a>` : 'N/A'}
                    </span>`);

                const socialLocation = socials.length ? socials.join('') : `<span class="info-pill-value">Nessun contatto presente!</span>`;

                // vengon caricate tutte le informazioni prinicpali del locale suddividendo la sidebar nella sezione "informazioni" e "social",
                // similmente a quanto fatto nel form di registrazione
                document.getElementById('luogo-body').innerHTML = `
                <div class="profilo-page">    
                    <div class="profilo-grid">

                            <!-- COLONNA SINISTRA -->
                            <div class="profilo-sidebar" style="border-radius:0; background:transparent; box-shadow:none; padding:0; gap:18px; align-items:stretch;">

                                <!-- INFO -->
                                <div class="luogo-card">
                                    <h2 class="luogo-card-title">📍 Informazioni</h2>
                                    <div class="info-grid">
                                        <div class="info-pill">
                                            <span class="info-pill-label luogo-color">Indirizzo</span>
                                            <span class="info-pill-value">${luogo.indirizzo}</span>
                                        </div>
                                        <div class="info-pill">
                                            <span class="info-pill-label luogo-color">Telefono</span>
                                            <span class="info-pill-value">${luogo.telefono || 'N/A'}</span>
                                        </div>
                                        <div class="info-pill">
                                            <span class="info-pill-label luogo-color">Orari</span>
                                            <span class="info-pill-value">${formattaOrario(luogo.apertura)} – ${formattaOrario(luogo.chiusura)}</span>
                                        </div>
                                        <div class="info-pill">
                                            <span class="info-pill-label luogo-color">Giorno di chiusura</span>
                                            <span class="info-pill-value">${luogo.giorno_chiusura || 'Siamo sempre aperti!'}</span>
                                        </div>
                                    </div>

                                    <!-- CONTATTI -->
                                    <h2 class="luogo-card-title mt-4">🔗 Social</h2>
                                    <div class="info-grid">
                                        <div class="info-pill gap-3">${socialLocation}</div>
                                    </div>
    
                                </div>

                            </div>

                            <!-- COLONNA DESTRA -->
                            <div class="profilo-content">

                                ${luogo.colazione ? `
                                    <div class="luogo-card">
                                        <h2 class="luogo-card-title">Fornitura per fascia oraria</h2>
                                        <canvas id="chartFornitura" height="120"></canvas>
                                    </div>`
                                : ''}

                                <!-- RECENSIONI -->
                                <div class="luogo-card">
                                    <h2 class="luogo-card-title">⭐ Recensioni</h2>

                                    <div class="media-voto">
                                        <span class="voto-numero" id="mediaVoto">${mediaVal ? mediaVal.toFixed(1) : '—'}</span>
                                        <div>
                                            <div class="stelle-show" id="mediaStelle">
                                                ${stelleSVG(5, mediaVal ? Math.round(mediaVal) : 0)}
                                            </div>
                                            <div class="voto-count" id="votoCount">
                                                ${recensioni.length} recension${recensioni.length === 1 ? 'e' : 'i'}
                                            </div>
                                        </div>
                                    </div>

                                    ${formSection}

                                    <div id="recensioniList" class="recensioni-list"></div>
                                </div>

                            </div>

                        </div>
                    </div>`;

                // vengono inseriti il grafico per le forniture e le recensioni
                renderRecensioni(recensioni);
                renderChartFornitura(recensioni, aperturaCorrente, chiusuraColazione);

                if (utenteLoggato) {
                    // viene controllato se l'utente ha effettuato il login al sito e, in tal caso, viene inizializzato il form per inserire
                    // una nuova recensione
                    initStelle();

                    document.querySelectorAll('.fascia-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            document.querySelectorAll('.fascia-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                        });
                    });

                    document.getElementById('btnInviaRec').addEventListener('click', () => inviaRecensione(id));

                    // SLIDER FORNITURA
                    // inizializza lo slider per il livello di fornitura (form recensione - sezione Colazione)
                    const slider = document.getElementById('fornituraSlider');
                    if (slider) {
                        const valLabel = document.getElementById('fornituraValore');
                        slider.addEventListener('input', () => {
                            // viene "recuperato" l'elemento slider e il suo valore, mostrato accanto a "livello fornitura"
                            const v = slider.value;
                            valLabel.textContent = v;

                            // ad ogni movimento del cursore, viene aggiornata la barra riempendo di giallo la parte corrispondente
                            // e modificando il valore numerico: ogni step rappresenta un incremento del 25%
                            // il "trucco" sta nel calcolare la percentuale di riempimento in base al valore attuale: usiamo 'v-1' in modo da
                            // considerare 0% quando il valore è 1 -> (1-1)/4*100 = 0%
                            const pct = ((v-1) / 4) * 100;
                            slider.style.background =
                                `linear-gradient(to right, #FFC107 ${pct}%, #e9ecef ${pct}%)`;
                        });
                    }     
                               
                }

            } catch (err) {
                // nel caso in cui non si riescano a recuperare le informazioni del locale, viene mostato un placeholder con il messaggio di errore
                console.error('Errore caricaDettaglio:', err);
                document.getElementById('banner').innerHTML = '';
                document.getElementById('luogo-body').innerHTML = `
                    <div class="luogo-card" style="text-align:center;padding:60px 20px">
                        <p style="font-size:3rem;margin-bottom:12px">😕</p>
                        <p style="font-weight:700;color:#555;margin-bottom:20px">Luogo non trovato.</p>
                        <button class="btn-back-banner" style="position:static;display:inline-flex"
                            onclick="window.location.href='/'">← Torna alla lista</button>
                    </div>`;
            }
        }

        caricaDettaglio();
    </script>
</body>
</html>
