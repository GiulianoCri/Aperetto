<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
</head>
<body>
    <div class="row gap-2 align-items-center m-auto mt-3">
        <form class="justify-content-sm-between">
            <fieldset>
                <legend>Dati Personali</legend>
                <div class="row align-items-center justify-content-center gap-2 m-auto">
                    <input type="text" class="form-control rounded-3 col-md-4" id="name" placeholder="Nome" required>
                    <input type="text" class="form-control rounded-3 col-md-4" id="surname" placeholder="Cognome" required> <br>
                    
                    <input type="email" class="form-control w-50 rounded-3" id="email" placeholder="E-Mail" required>
                    <input type="password" class="form-control w-25 rounded-3" id="password" placeholder="Password" required>
                    <input type="password" class="form-control w-25 rounded-3" id="confirm_password" placeholder="Conferma Password" required>  
                </div>
                
                <div class="d-flex gap-3 align-items-center mt-4">
                    <button type="submit" class="btn btn-success m-auto w-25"> Registrati</btn>
                    <button type="reset" class="btn btn-danger m-auto w-25" > Reset </btn>
                </div>

            </fieldset>
        </form>
    </div>
    
</body>
</html>
