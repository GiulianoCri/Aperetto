<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperetto: aperitivo o cornetto?</title>
    <link rel="icon" type="image/x-icon" href="/Foto/APERETTO (1).png">
    <link rel="stylesheet" href="classi.css">
</head>
<body>
    <form>
        <fieldset>
            <legend>Dati Personali</legend>
            <input type="text" id="name" placeholder="Nome" width="100">
            <input type="text" id="surname" placeholder="Cognome"> <br>
            <input type="date" id="birthdate" placeholder="Data di Nascita"> <br>
            
            <input type="radio" id="maschio" name="gender" value="Maschio">Maschio
            <input type="radio" id="femmina" name="gender" value="Femmina">Femmina
            <input type="radio" id="altro" name="gender" value="Altro">Altro <br>
            <input type="email" id="email" placeholder="E-Mail"> <br>

            <input type="password" id="password" placeholder="Password"> <br>
            <input type="password" id="confirm_password" placeholder="Conferma Password"> <br>

        </fieldset>
    </form>
    
</body>
</html>
